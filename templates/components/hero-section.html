<!-- 히어로 섹션: 후킹 헤드라인 + 대표 이미지 -->
<!-- 사용법: {{변수명}}을 실제 내용으로 교체하세요 -->

<div style="background: var(--bg-color, #FFF8F0); padding: 40px 24px; text-align: center;">
    <!-- 로고 -->
    <img src="../brand/logo/logo.png" alt="로고" style="max-width: 150px; height: auto; margin-bottom: 20px;">

    <!-- 후킹 헤드라인 -->
    <h1 style="font-size: 26px; font-weight: 800; line-height: 1.4; color: var(--main-color, #333); margin-bottom: 12px;">
        {{후킹 헤드라인}}
    </h1>

    <!-- 서브 카피 -->
    <p style="font-size: 16px; color: #666; line-height: 1.6; margin-bottom: 20px;">
        {{서브 카피}}
    </p>

    <!-- 대표 이미지 -->
    <div style="background: #f0f0f0; border: 2px dashed #ccc; border-radius: 12px; padding: 60px 20px; text-align: center; color: #999; font-size: 14px;">
        여기에 대표 상품 사진을 넣으세요
    </div>
</div>
